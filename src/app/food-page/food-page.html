<div class="container">
    <img [src]="food.imageUrl" alt="{{food.name}}">
    <div class="datails">
        <div class="header">
            <span class="name">
                {{food.name}}
            </span>
            <span class="favorite not" >
                🤍
            </span>
        </div>
        <div class="rating">
            <div class="stars">
                    <ng-container *ngFor="let i of [1,2,3,4,5]">
                        <span>
                            {{ i <= food.stars ? '★' : '☆' }}
                        </span>
                    </ng-container>

                     <span>
                        ({{ food.stars }})

                     </span>
                </div>
        </div>
         <div class="origins">
            <span *ngFor="let origin of food.origins"> {{origin}}</span>
 
    </div>

    <div class="tags">
        <app-tags></app-tags>
    </div>
    
</div>
