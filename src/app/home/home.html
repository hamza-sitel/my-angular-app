<app-search></app-search>
<ul>
    <li *ngFor="let food of foods">
        <a href="">
             <img [src]="food.imageUrl" alt="logo">
             <div class="content">
                <div class="name">
                    {{food.name}}
                </div>
                <span class="favorite {{food.favorite?'': 'not' }}">
                    ❤ 
                </span>

                <div class="stars">
                    <ng-container *ngFor="let i of [1,2,3,4,5]">
                        <span>
                            {{ i <= food.stars ? '★' : '☆' }}
                        </span>
                    </ng-container>

                     <span>
                        ({{ food.stars }})

                     </span>
                </div>
                <div class="product-item-footer">
                    <div class="origins">
                        <span *ngFor="let origin of food.origins">
                            {{origin}}
                        </span>
                    </div>
                      <div class="cook-time">
                    <span>🕒</span>
                    {{food.cookTime}}
                </div>
                </div>
              
                <div class="price">
                    <span>
                        {{ food.price |currency:'$ '}}
                    </span>
                </div>

             
            </div>
        </a>
    </li>
</ul>
